version: "3.9"

services:

  db:
    image: postgres:16
    container_name: drive_postgres
    restart: unless-stopped

    env_file:
      - .env.docker

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drive_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .

    container_name: drive_web

    restart: unless-stopped

    command: sh entrypoint.sh

    env_file:
      - .env.docker

    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

  celery:
    build: .

    container_name: drive_celery

    restart: unless-stopped

    command: celery -A config worker -l info

    env_file:
      - .env.docker

    volumes:
      - .:/app

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

  celerybeat:
    build: .

    container_name: drive_celerybeat

    restart: unless-stopped

    command: celery -A config beat -l info

    env_file:
      - .env.docker

    volumes:
      - .:/app

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

volumes:

  postgres_data:

  redis_data:

  media_data:

  static_data: