<div class="modal fade" id="shareModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Share "<span id="shareItemName"></span>"</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <!-- Hidden fields set by JS when modal opens -->
                <input type="hidden" id="shareItemId">
                <input type="hidden" id="shareItemType">

                <!-- User search -->
                <div class="mb-3">
                    <label class="form-label">Share with (username or email)</label>
                    <input type="text" id="shareUserSearch" class="form-control"
                           placeholder="Search by username or email..." autocomplete="off">
                    <div id="shareUserResults" class="list-group mt-1 position-absolute w-100" style="z-index:1055; max-width:500px;"></div>
                </div>

                <!-- Permission selector -->
                <div class="mb-3">
                    <label class="form-label">Permission</label>
                    <select id="sharePermission" class="form-select">
                        <option value="view">View only</option>
                        <option value="edit">Can edit</option>
                    </select>
                </div>

                <!-- Selected user display -->
                <div id="shareSelectedUser" class="d-none mb-3">
                    <div class="alert alert-info d-flex justify-content-between align-items-center mb-0">
                        <span>Sharing with: <strong id="shareSelectedUsername"></strong></span>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="shareClearUser">✕</button>
                    </div>
                </div>

                <div class="text-danger small mb-3 d-none" id="shareError"></div>

                <button type="button" class="btn btn-app-primary w-100" id="shareConfirmBtn">
                    Share
                </button>

                <hr>

                <!-- Access management panel -->
                <h6 class="mb-3">People with access</h6>
                <div id="shareAccessList">
                    <div class="text-muted small">Loading...</div>
                </div>

            </div>
        </div>
    </div>
</div>
