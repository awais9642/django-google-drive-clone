<div class="modal fade" id="scheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Schedule deletion — "<span id="scheduleFileName"></span>"</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="scheduleFileId">

                <div id="scheduleCurrentInfo" class="alert alert-warning d-none">
                    <strong>Already scheduled:</strong>
                    <span id="scheduleCurrentTime"></span>
                    <button type="button" class="btn btn-sm btn-outline-danger ms-2" id="cancelScheduleBtn">
                        Cancel schedule
                    </button>
                </div>

                <div class="mb-3">
                    <label for="scheduleDateTime" class="form-label">
                        Delete at this date and time
                    </label>
                    <input type="datetime-local" id="scheduleDateTime" class="form-control">
                    <div class="form-text">
                        The file will be permanently deleted at exactly this time.
                        This cannot be undone.
                    </div>
                </div>

                <div class="text-danger small d-none" id="scheduleError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="scheduleConfirmBtn">
                    Schedule deletion
                </button>
            </div>
        </div>
    </div>
</div>
